app:
  title: Internal Developer Portal
  baseUrl: http://localhost:7007

organization:
  name: Platform Engineering

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    host: 0.0.0.0
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  environment: development
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

scaffolder: {}

catalog:
  rules:
    - allow: [Component, Template]
  locations:
    - type: file
      target: ./catalog/templates/mini-service/template.yaml
      rules:
        - allow: [Template]
