name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ values.name }}:$GITHUB_SHA .

      - name: Smoke test container
        run: |
          docker run -d --name svc -p ${{ values.port }}:${{ values.port }} ${{ values.name }}:$GITHUB_SHA
          sleep 3
          curl -f http://localhost:${{ values.port }}/health
          docker stop svc
